version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: astroai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: astroai
    volumes:
      - mongodb_data:/data/db
      - ./Database.txt:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - astroai-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: astroai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - astroai-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astroai-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/astroai?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      GEMINI_API_KEY: your-gemini-api-key
      EMAIL_USER: your-email@gmail.com
      EMAIL_PASS: your-email-app-password
      REDIS_URL: redis://redis:6379
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
      - redis
    networks:
      - astroai-network
    volumes:
      - ./api-backend:/app/backend
      - /app/backend/node_modules

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astroai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - astroai-network
    volumes:
      - ./website/build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  astroai-network:
    driver: bridge
